<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erik Gilson - Agendamento de Massoterapia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a535c; /* Verde Petróleo Profundo */
            --accent: #4ecdc4; /* Verde Água Relaxante */
            --gold: #d4af37;   /* Dourado Sutil */
            --text: #2f3e46;   /* Cinza Escuro Suave */
            --white: #ffffff;
            --bg-body: #f0f4f8; /* Fundo Suave */
            --bg-card: rgba(255, 255, 255, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-body);
            background-image: 
                linear-gradient(135deg, rgba(26, 83, 92, 0.05) 0%, rgba(78, 205, 196, 0.05) 100%),
                url('https://www.transparenttextures.com/patterns/linen.png'); /* Textura de Linho Sutil */
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            max-width: 480px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            position: relative;
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
            margin-top: 60px; /* Espaço para a foto flutuante */
        }

        /* Container da Foto - Com Link Online para Garantir o Funcionamento */
        .profile-pic-container {
            position: absolute;
            top: -70px; /* Faz a foto flutuar acima do card */
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--white);
            padding: 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 4px solid var(--gold); /* Borda Dourada Premium */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .profile-pic {
            width: auto;
            height: 115%; /* Ajuste para preencher o círculo */
            object-fit: contain;
        }

        .header { margin-top: 80px; margin-bottom: 35px; }
        .header h1 { font-size: 1.8rem; color: var(--primary); font-weight: 600; line-height: 1.2; }
        .header p { font-size: 1rem; color: #666; margin-top: 6px; font-weight: 300; }

        /* Ícone do Instagram Fixo no Canto Inferior Direito */
        .insta-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #E1306C;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            box-shadow: 0 6px 15px rgba(225, 48, 108, 0.4);
            z-index: 1000;
            transition: all 0.3s ease;
        }
        .insta-link:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 8px 20px rgba(225, 48, 108, 0.5); }

        .input-group { margin-bottom: 22px; text-align: left; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--primary); padding-left: 5px; }
        
        select, input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e0e6ed;
            border-radius: 14px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s;
            background: #fdfdfd;
            color: var(--text);
        }

        select:focus, input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 5px rgba(78, 205, 196, 0.1); }

        /* Estilização do select */
        select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231a535c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 16px;
            padding-right: 50px;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(26, 83, 92, 0.15);
        }

        .btn-submit:hover { background: #144046; transform: translateY(-3px); box-shadow: 0 12px 30px rgba(26, 83, 92, 0.25); }
        .btn-submit i { font-size: 1.4rem; color: #25D366; } /* Ícone do WhatsApp */

        .footer-note { text-align: center; font-size: 0.8rem; color: #888; margin-top: 25px; font-weight: 300; }
        
        /* Ajustes para telas pequenas */
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            .profile-pic-container { width: 120px; height: 120px; top: -60px; }
            .header { margin-top: 70px; }
            .header h1 { font-size: 1.6rem; }
            .insta-link { bottom: 20px; right: 20px; width: 45px; height: 45px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="profile-pic-container">
        <img src="fotosite.png" alt="Erik Gilson Massoterapeuta" class="profile-pic">
    </div>

    <div class="header">
        <h1>Erik Gilson</h1>
        <p>Massoterapia • Equilíbrio & Bem-estar</p>
    </div>

    <div class="input-group">
        <label><i class="fas fa-spa"></i> Escolha o seu atendimento:</label>
        <select id="servico">
            <option disabled selected>Selecione uma opção...</option>
            <optgroup label="Corpo Completo — R$ 80">
                <option value="Massagem Relaxante (Corpo Completo - R$80)">🔹 Massagem Relaxante</option>
                <option value="Liberação Miofascial (Corpo Completo - R$80)">🔹 Liberação Miofascial</option>
            </optgroup>
            <optgroup label="Foco Localizado (Meio Corpo) — R$ 55">
                <option value="Massagem Relaxante (Pernas ou Costas - R$55)">🔸 Massagem Relaxante</option>
                <option value="Liberação Miofascial (Pernas ou Costas - R$55)">🔸 Liberação Miofascial</option>
            </optgroup>
        </select>
    </div>

    <div class="input-group">
        <label><i class="far fa-calendar-alt"></i> Data Preferencial:</label>
        <input type="date" id="data">
    </div>

    <div class="input-group">
        <label><i class="far fa-clock"></i> Melhor Horário:</label>
        <input type="time" id="hora">
    </div>

    <button class="btn-submit" onclick="enviarAgendamento()">
        <i class="fab fa-whatsapp"></i> Solicitar Agendamento
    </button>

    <p class="footer-note">Aguarde nossa confirmação de disponibilidade.</p>
</div>

<a href="https://www.instagram.com/erikmassoterapia_/" target="_blank" class="insta-link" title="Siga no Instagram">
    <i class="fab fa-instagram"></i>
</a>

<script>
    // --- Configuração da Data Mínima (Hoje) ---
    const campoData = document.getElementById('data');
    const hojeData = new Date();
    const dataMinima = hojeData.toISOString().split('T')[0];
    campoData.setAttribute('min', dataMinima);
    campoData.value = dataMinima; // Define hoje como padrão

    // --- Função de Envio para WhatsApp ---
    function enviarAgendamento() {
        const numeroTelefone = "5586999741569";
        const servicoSelecionado = document.getElementById('servico').value;
        const dataSelecionada = document.getElementById('data').value;
        const horaSelecionada = document.getElementById('hora').value;

        // Validação
        if(!servicoSelecionado || servicoSelecionado === "Selecione uma opção..." || !dataSelecionada || !horaSelecionada) {
            alert("Por favor, preencha todos os campos para solicitar o agendamento.");
            return;
        }

        // Formatação da data (AAAA-MM-DD para DD/MM/AAAA)
        const partesData = dataSelecionada.split('-');
        const dataFormatadaBr = `${partesData[2]}/${partesData[1]}/${partesData[0]}`;
        
        // Mensagem Formatada
        const mensagemWhats = `Olá, Erik! Gostaria de agendar uma sessão pelo site:%0A%0A` +
                              `🌿 *Sessão:* ${servicoSelecionado}%0A` +
                              `📅 *Data:* ${dataFormatadaBr}%0A` +
                              `🕒 *Horário:* ${horaSelecionada}%0A%0A` +
                              `Pode me confirmar a disponibilidade? Obrigado!`;

        // Abre o WhatsApp
        window.open(`https://wa.me/${numeroTelefone}?text=${mensagemWhats}`, '_blank');
    }
</script>

</body>
</html>
